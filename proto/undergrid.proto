syntax = "proto3";

package undergrid;

// Messages

message ResourceSnapshot {
    uint64 cpu_cores = 1;
    double cpu_usage_pct = 2;
    uint64 memory_total_bytes = 3;
    uint64 memory_available_bytes = 4;
    uint64 disk_total_bytes = 5;
    uint64 disk_available_bytes = 6;
}

message NodeInfo {
    string node_id = 1;
    string hostname = 2;
    string ip_address = 3;
    uint32 port = 4;
    ResourceSnapshot resources = 5;
}

message Batch {
    uint64 timeout_s = 1;
}

enum RestartPolicy {
    ALWAYS = 0;
    RETRIES = 1;
    NONE = 2;
}

message RestartConfig {
    RestartPolicy policy = 1;
    uint64 max_retries = 2;
    uint64 retry_delay_s = 3;
}

message PortMapping {
    uint32 container_port = 1;
    string protocol = 2;
}

message Service {
    string health_check = 1;
    RestartConfig restart_config = 2;
    repeated PortMapping ports = 5;
}

message TaskSpec {
    string id = 1;
    string image = 2;
    repeated string command = 3;
    map<string, string> env = 4;
    double cpu_cores = 5;
    uint64 memory_bytes = 6;
    uint64 disk_bytes = 7;
    bool gpu = 8;
    repeated string depends_on = 9;
    oneof kind {
        Batch batch = 10;
        Service service = 11;
    }
}

message TaskOutput {
    bytes stdout = 1;
    bytes stderr = 2;
    int32 exit_code = 3;
}

enum JobStatus {
    PENDING = 0;
    RUNNING = 1;
    COMPLETED = 2;
    FAILED = 3;
}

// Ping

message PingRequest {
    string from_node_id = 1;
}

message PingResponse {
    string node_id = 1;
    uint64 uptime_secs = 2;
}

// Register

message RegisterRequest {
    NodeInfo node_info = 1;
}

message RegisterResponse {
    bool accepted = 1;
    string cluster_id = 2;
    string leader_id = 3;
    repeated NodeInfo peers = 4;
}

// Heartbeat

message HeartbeatRequest {
    string node_id = 1;
    ResourceSnapshot resources = 2;
    repeated string running_tasks = 3;
}

message HeartbeatResponse {
    bool acknowledged = 1;
}

// Vote

message VoteRequest {
    uint64 term = 1;
    string candidate_id = 2;
}

message VoteResponse {
    uint64 term = 1;
    bool granted = 2;
}

// Entries

message AppendEntriesRequest {
    uint64 term = 1;
    string leader_id = 2;
}

message AppendEntriesResponse {
    uint64 term = 1;
    bool success = 2;
    string node_id = 3;
}

// Add Peer

message AddPeerRequest {
    NodeInfo peer_node_info = 1;
}

message AddPeerResponse {
    bool success = 1;
}

// Remove Peer

message RemovePeerRequest {
    string peer_node_id = 1;
}

message RemovePeerResponse {
    bool success = 1;
}

// Submit Job Request

message SubmitJobRequest {
    string job_id = 1;
    repeated TaskSpec tasks = 2;
}

message SubmitJobResponse {
    bool accepted = 1;
    string error = 2;
}

// Task Dispatch

message DispatchTaskRequest {
    string job_id = 1;
    TaskSpec task_spec = 2;
}

message DispatchTaskResponse {
    bool accepted = 1;
    string error = 2;
}

// Task Result

message ReportTaskResultRequest {
    string node_id = 1;
    string job_id = 2;
    string task_id = 3;
    TaskOutput output = 4;
    bool executed = 5;
    string error = 6;
}

message ReportTaskResultResponse {
    bool acknowledged = 1;
}

// Get Job Status

message GetJobStatusRequest {
    string job_id = 1;
}

message GetJobStatusResponse {
    bool found = 1;
    JobStatus status = 2;
    uint64 elapsed_ms = 3;
    string error = 4;
}

service NodeAgent {
    rpc Ping (PingRequest) returns (PingResponse);
    rpc Register (RegisterRequest) returns (RegisterResponse);
    rpc Heartbeat (HeartbeatRequest) returns (HeartbeatResponse);
    rpc Vote (VoteRequest) returns (VoteResponse);
    rpc AppendEntries (AppendEntriesRequest) returns (AppendEntriesResponse);
    rpc AddPeer (AddPeerRequest) returns (AddPeerResponse);
    rpc RemovePeer (RemovePeerRequest) returns (RemovePeerResponse);
    rpc SubmitJob (SubmitJobRequest) returns (SubmitJobResponse);
    rpc DispatchTask (DispatchTaskRequest) returns (DispatchTaskResponse);
    rpc ReportTaskResult (ReportTaskResultRequest) returns (ReportTaskResultResponse);
    rpc GetJobStatus (GetJobStatusRequest) returns (GetJobStatusResponse);
}
